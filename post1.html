<!DOCTYPE html>
<html>
<head>
  <title>Apply Now - Step 2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
  <script src="script.js"></script>
</head>

<body>

<header>Processing Application</header>

<h1 class="heading">Step 2 - Verify Details</h1>

<p>Yojana ke liye apply karne se pehle kuch important details...</p>

<button onclick="scrollToTimer()">Apply Now</button>

<div style="height:500px"></div>

<p>Kripya niche scroll kare aur process complete kare...</p>

<!-- TIMER SECTION -->
<div id="timerSection">

<!-- Timer Start -->
<div style="background:#ffffff; padding:20px; margin:20px 0; text-align:center; border-radius:12px; box-shadow:0 0 10px rgba(0,0,0,0.1);">

  <div style="position:relative;width:180px;height:180px;margin:auto">

    <div style="position:absolute;width:100%;height:100%;border-radius:50%;border-top:4px solid #00aaff;animation:spin 2s linear infinite"></div>
    <div style="position:absolute;width:100%;height:100%;border-radius:50%;border-right:4px solid #ffaa00;animation:spinReverse 3s linear infinite"></div>
    <div style="position:absolute;width:100%;height:100%;border-radius:50%;border-bottom:4px solid #ff3366;animation:spin 4s linear infinite"></div>

    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#000;">
      <div style="font-size:13px;margin-bottom:5px;">Please Wait...</div>
      <div class="timer" style="font-size:28px;font-weight:bold;">10</div>
    </div>

  </div>

</div>
<!-- Timer End -->

</div>

<button id="nextBtn" onclick="goToSite3()">Continue</button>

</body>
</html>
